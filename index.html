<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial; background:#f4f6f9; margin:0; padding:20px; }
.container { max-width:500px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
input, textarea { width:100%; margin:10px 0; padding:10px; }
button { width:100%; padding:12px; background:#007bff; color:#fff; border:none; }
.msg { text-align:center; margin-top:10px; }
</style>
</head>

<body>

<div class="container">
<h2>Abrir Chamado</h2>

<form id="form">
<input name="nome" placeholder="Nome" required>
<input name="email" placeholder="Email" required>
<textarea name="mensagem" placeholder="Descreva o problema" required></textarea>
<button type="submit">Enviar</button>
</form>

<div class="msg" id="msg"></div>

<hr>

<h3>Consultar Chamado</h3>
<input id="protocolo" placeholder="Digite o protocolo">
<button onclick="consultar()">Consultar</button>

<div class="msg" id="resultado"></div>

</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbwhnKW1b3E_NUowcfbPjsslLy-AS1anZH8SevWfuc3KRAnu5MC08fqjMMptDH-KLfm0/exec";

document.getElementById("form").addEventListener("submit", function(e){
e.preventDefault();

fetch(url, {
method:"POST",
body: JSON.stringify({
nome: this.nome.value,
email: this.email.value,
mensagem: this.mensagem.value
})
})
.then(res=>res.json())
.then(res=>{
document.getElementById("msg").innerHTML =
"Chamado aberto!<br>Protocolo: <b>"+res.protocolo+"</b>";
this.reset();
});
});

function consultar(){
let p = document.getElementById("protocolo").value;

fetch(url+"?protocolo="+p)
.then(res=>res.json())
.then(res=>{
if(res.status=="found"){
document.getElementById("resultado").innerHTML =
"Status: "+res.statusChamado+"<br>Mensagem: "+res.mensagem;
}else{
document.getElementById("resultado").innerHTML = "Não encontrado";
}
});
}
</script>

</body>
</html>
