<!DOCTYPE html>

<title>Registro de Atendimento - TI</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: #eef2f7;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 100%;
  max-width: 500px;
  padding: 20px;
}

.card {
  background: #ffffff;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #2c3e50;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 14px;
  transition: 0.2s;
}

input:focus, select:focus {
  border-color: #007bff;
  outline: none;
  box-shadow: 0 0 5px rgba(0,123,255,0.3);
}

button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #007bff, #0056b3);
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  opacity: 0.9;
}

button:disabled {
  background: #aaa;
}

.msg {
  margin-top: 12px;
  text-align: center;
  font-size: 14px;
}

@media (max-width: 480px) {
  .card {
    padding: 20px;
  }
}
</style>
</head>

<script>
const url = "https://script.google.com/macros/s/AKfycbxcTfwomU5KOEFezNIlWAXXyWLksAw8TYRKCfaFpXAu7G_qTaIHtKIq4SsHpGd3cvot/exec";

const form = document.getElementById("form");
const msg = document.getElementById("msg");
const celular = document.getElementById("celular");

// Máscara celular
celular.addEventListener("input", function(e){
  let v = e.target.value.replace(/\D/g,"");

  if(v.length > 11) v = v.slice(0,11);

  if(v.length > 6){
    v = v.replace(/(\d{2})(\d{5})(\d+)/, "($1) $2-$3");
  } else if(v.length > 2){
    v = v.replace(/(\d{2})(\d+)/, "($1) $2");
  } else {
    v = v.replace(/(\d*)/, "($1");
  }

  e.target.value = v;
});

// Envio
form.addEventListener("submit", function(e){
  e.preventDefault();

  let celularLimpo = celular.value.replace(/\D/g,"");

  if(celularLimpo.length !== 11){
    msg.innerText = "Celular inválido!";
    msg.style.color = "red";
    return;
  }

  const protocolo = "ATD-" + Date.now();

  const data = {
    protocolo,
    nome: form.nome.value,
    escola: form.escola.value,
    atendimento: form.atendimento.value,
    email: form.email.value,
    celular: celular.value
  };

  fetch(url, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {
    msg.innerHTML = "✅ Atendimento registrado!<br>Protocolo: <b>" + protocolo + "</b>";
    msg.style.color = "green";
    form.reset();
  })
  .catch(() => {
    msg.innerText = "Erro ao enviar.";
    msg.style.color = "red";
  });
});
</script>
